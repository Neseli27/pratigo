<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRATİGO</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #060a12; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            max-width: 1100px;
            margin: 0 auto;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }

        /* LANDING (QR'sız giriş) */
        .landing {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            display: none;
        }
        .landing .logo {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
            margin-bottom: 40px;
        }
        .landing .alt-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 8px 32px rgba(249, 115, 22, 0.3);
        }
        .btn-isletme {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 12px;
            box-shadow: 0 4px 16px rgba(249, 115, 22, 0.3);
        }
        .btn-kayit-link {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #94a3b8;
            border: 2px solid #334155;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .copyright {
            margin-top: 48px;
            color: #334155;
            font-size: 0.75rem;
        }

        /* YÜKLEME (QR ile giriş) */
        .yukleme {
            text-align: center;
            padding: 2rem;
            display: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #1e293b;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .yukleme-text {
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <!-- QR'SIZ GİRİŞ: LANDING -->
    <div class="landing" id="landing">
        <div class="alt-logo">P</div>
        <div class="logo">PRATİGO</div>
        <a class="btn-isletme" href="/kasiyer">İşletme Girişi</a>
        <a class="btn-kayit-link" href="/kayit">Yeni İşletme Kaydı</a>
        <p class="copyright">© 2026 PRATİGO</p>
    </div>

    <!-- QR İLE GİRİŞ: YÜKLEME -->
    <div class="yukleme" id="yukleme">
        <div class="spinner"></div>
        <p class="yukleme-text">Yükleniyor...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const isletmeId = params.get('isletme');
            const avmId = params.get('avm');

            // AVM QR'ı ile gelen → AVM sayfasına yönlendir
            if (avmId) {
                window.location.href = '/avm?id=' + avmId;
                return;
            }

            // QR parametresi yoksa → landing göster
            if (!isletmeId) {
                document.getElementById('landing').style.display = 'block';
                return;
            }

            // QR ile gelen → yükleme göster, oturum oluştur
            document.getElementById('yukleme').style.display = 'block';

            try {
                const isletmeDoc = await db.collection('isletmeler').doc(isletmeId).get();
                if (!isletmeDoc.exists) {
                    document.getElementById('yukleme').style.display = 'none';
                    document.getElementById('landing').style.display = 'block';
                    return;
                }

                document.querySelector('.yukleme-text').textContent = isletmeDoc.data().ad || 'Yükleniyor...';

                const oturumRef = await db.collection('oturumlar').add({
                    isletmeId: isletmeId,
                    isletmeAdi: isletmeDoc.data().ad || '',
                    aktif: true,
                    kod: null,
                    sepet: [],
                    olusturma: firebase.firestore.FieldValue.serverTimestamp()
                });

                window.location.href = '/musteri?oturum=' + oturumRef.id + '&isletme=' + isletmeId;
            } catch(e) {
                console.error('PRATİGO hata:', e);
                document.querySelector('.yukleme-text').textContent = 'Bağlantı hatası. Tekrar deneyin.';
                document.querySelector('.spinner').style.borderTopColor = '#ef4444';
            }
        })();
    </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js")}</script>
</body>
</html>
