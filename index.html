<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRATİGO</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <meta name="theme-color" content="#f97316">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 3rem;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #334155;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text {
            color: #cbd5e1;
            font-size: 1.1rem;
        }
        .error-box {
            background: #7f1d1d;
            border: 1px solid #dc2626;
            border-radius: 12px;
            padding: 1.5rem;
            display: none;
        }
        .error-box p { color: #fca5a5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">PRATİGO</div>
        <p class="subtitle">Sipariş Ver · Masanda Otur · Telefonun Titresin</p>
        <div id="loading">
            <div class="spinner"></div>
            <p class="status-text">Menü yükleniyor...</p>
        </div>
        <div id="error" class="error-box">
            <p>QR kodu geçersiz veya işletme bulunamadı.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const isletmeId = params.get('isletme');

            if (!isletmeId) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                return;
            }

            const isletmeDoc = await db.collection('isletmeler').doc(isletmeId).get();
            if (!isletmeDoc.exists) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                return;
            }

            // Oturum oluştur (kod henüz yok, kasaya gönderilince üretilecek)
            const oturumRef = await db.collection('oturumlar').add({
                isletmeId: isletmeId,
                isletmeAdi: isletmeDoc.data().ad || '',
                aktif: true,
                kod: null,
                sepet: [],
                olusturma: firebase.firestore.FieldValue.serverTimestamp()
            });

            window.location.href = '/musteri?oturum=' + oturumRef.id + '&isletme=' + isletmeId;
        })();
    </script>
</body>
</html>
