<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRATİGO - Restoranlar</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #060a12; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 40px;
            max-width: 1100px;
            margin: 0 auto;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }

        /* ÜST ALAN */
        .ust-alan {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            text-align: center;
            padding: 32px 16px 24px;
            border-bottom: 1px solid #334155;
        }
        .avm-adi {
            font-size: 1.6rem;
            font-weight: 900;
            color: #f8fafc;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .avm-alt {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .pratigo-badge {
            display: inline-block;
            padding: 3px 12px;
            background: #334155;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 2px;
        }

        /* RESTORAN LİSTESİ */
        .section-title {
            padding: 20px 16px 12px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .restoran-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 16px;
        }
        @media (min-width: 600px) {
            .restoran-grid { grid-template-columns: 1fr 1fr 1fr; }
        }
        .restoran-kart {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }
        .restoran-kart:active {
            border-color: #f97316;
            transform: scale(0.97);
            background: #334155;
        }
        .restoran-ikon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 900;
        }
        .restoran-ad {
            font-weight: 700;
            font-size: 0.95rem;
            color: #f8fafc;
            line-height: 1.3;
        }
        .restoran-durum {
            font-size: 0.75rem;
            margin-top: 6px;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .restoran-durum.acik {
            background: #14532d;
            color: #22c55e;
        }
        .restoran-durum.kapali {
            background: #450a0a;
            color: #ef4444;
        }

        /* YÜKLEME */
        .yukleme {
            text-align: center;
            padding: 60px 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e293b;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .bos-mesaj {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
        }
        .bos-mesaj .ikon { font-size: 2.5rem; margin-bottom: 12px; }

        .copyright {
            text-align: center;
            margin-top: 32px;
            color: #1e293b;
            font-size: 0.7rem;
        }

        /* HOŞ GELDİNİZ OVERLAY */
        .hosgeldin-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #0b1120 0%, #1e293b 100%);
            z-index: 500;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }
        .hosgeldin-overlay.kapan { opacity: 0; pointer-events: none; }
        .hosgeldin-icerik {
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
        }
        .hosgeldin-logo {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; color: #fff;
            margin: 0 auto 24px;
            box-shadow: 0 8px 32px rgba(249,115,22,0.35);
            animation: logoGiris 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }
        .hosgeldin-avm {
            font-size: 2.3rem; font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f97316, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.15;
            animation: avmGiris 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
            opacity: 0;
        }
        .hosgeldin-mesaj {
            font-size: 1.25rem; color: #cbd5e1; font-weight: 500;
            margin-top: 4px;
            animation: mesajGiris 0.5s ease-out 0.9s forwards;
            opacity: 0;
        }
        .hosgeldin-badge {
            margin-top: 28px;
            font-size: 0.7rem; color: #475569;
            letter-spacing: 3px; font-weight: 700;
            animation: mesajGiris 0.5s ease-out 1.3s forwards;
            opacity: 0;
        }
        @keyframes logoGiris {
            from { opacity: 0; transform: scale(0.5) rotate(-12deg); }
            to { opacity: 1; transform: scale(1) rotate(0); }
        }
        @keyframes avmGiris {
            from { opacity: 0; transform: scale(0.8) translateY(16px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes mesajGiris {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- HOŞ GELDİNİZ OVERLAY -->
    <div class="hosgeldin-overlay" id="hosgeldinOverlay">
        <div class="hosgeldin-icerik">
            <div class="hosgeldin-logo">P</div>
            <div class="hosgeldin-avm" id="hosgeldinAvm">...</div>
            <div class="hosgeldin-mesaj">Hoş Geldiniz</div>
            <div class="hosgeldin-badge">PRATİGO</div>
        </div>
    </div>

    <div class="ust-alan">
        <div class="avm-adi" id="avmAdi">...</div>
        <div class="avm-alt">Restoran & Kafe</div>
        <div class="pratigo-badge">PRATİGO</div>
    </div>

    <div id="yukleme" class="yukleme">
        <div class="spinner"></div>
        <p style="color:#64748b;font-size:0.9rem">Restoranlar yükleniyor...</p>
    </div>

    <div id="icerik" style="display:none">
        <p class="section-title">Bir restoran seçin</p>
        <div class="restoran-grid" id="restoranGrid"></div>
    </div>

    <div id="bosMesaj" class="bos-mesaj" style="display:none">
        <div class="ikon">🍽️</div>
        <p>Henüz kayıtlı restoran bulunmuyor.</p>
    </div>

    <p class="copyright">© 2026 PRATİGO</p>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
    <script src="/guvenlik.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const avmId = params.get('id') || 'primemall';

        // AVM bilgisini çek (header + hoş geldiniz overlay)
        db.collection('avmler').doc(avmId).get().then(doc => {
            const ad = doc.exists ? (doc.data().ad || 'AVM') : 'Primemall AVM';
            document.getElementById('avmAdi').textContent = ad;
            document.getElementById('hosgeldinAvm').textContent = ad;
        }).catch(() => {
            document.getElementById('hosgeldinAvm').textContent = 'PRATİGO';
        });

        // Hoş geldiniz overlay'i 2.2 sn sonra kapat (animasyon ~1.6 sn sürüyor)
        setTimeout(() => {
            const ov = document.getElementById('hosgeldinOverlay');
            if (ov) ov.classList.add('kapan');
            setTimeout(() => { if (ov) ov.style.display = 'none'; }, 500);
        }, 2200);

        // İşletmeleri dinle (anlık güncelleme)
        db.collection('isletmeler')
            .where('avmId', '==', avmId)
            .onSnapshot(snap => {
                document.getElementById('yukleme').style.display = 'none';

                const isletmeler = [];
                snap.forEach(doc => {
                    const data = { id: doc.id, ...doc.data() };
                    if (data.durum !== 'askida') isletmeler.push(data);
                });

                if (isletmeler.length === 0) {
                    document.getElementById('bosMesaj').style.display = 'block';
                    document.getElementById('icerik').style.display = 'none';
                    return;
                }

                document.getElementById('bosMesaj').style.display = 'none';
                document.getElementById('icerik').style.display = 'block';

                const grid = document.getElementById('restoranGrid');
                grid.innerHTML = isletmeler.map(i => {
                    const harf = GH((i.ad || '?').charAt(0).toUpperCase());
                    const acikMi = isletmeAcikMi(i);

                    // Tahmini süre
                    let sureHTML = '';
                    if (i.tapiSure && i.tapiVeriSayisi >= 3) {
                        sureHTML = '<div style="font-size:0.75rem;color:#94a3b8;margin-top:4px">⏱ ~' + i.tapiSure + ' dk</div>';
                    }

                    return `
                    <div class="restoran-kart" onclick="restoranSec('${i.id}', this)">
                        <div class="restoran-ikon">${harf}</div>
                        <div class="restoran-ad">${GH(i.ad)}</div>
                        <div class="restoran-durum ${acikMi ? 'acik' : 'kapali'}">${acikMi ? '● Açık' : '● Kapalı'}</div>
                        ${sureHTML}
                    </div>
                    `;
                }).join('');
            });

        function isletmeAcikMi(isletme) {
            const cs = isletme.calismaSaatleri;
            if (!cs) return true; // Saat tanımlamamışsa açık say

            const simdi = new Date();
            const gunler = ['pazar','pazartesi','sali','carsamba','persembe','cuma','cumartesi'];
            const bugunkiGun = gunler[simdi.getDay()];
            const tarih = simdi.toISOString().split('T')[0];

            let gunVerisi = null;
            if (isletme.gunOzel && isletme.gunOzel[tarih]) {
                gunVerisi = isletme.gunOzel[tarih];
            } else {
                gunVerisi = cs[bugunkiGun];
            }

            if (!gunVerisi || gunVerisi.kapali) return false;

            const saat = String(simdi.getHours()).padStart(2, '0') + ':' + String(simdi.getMinutes()).padStart(2, '0');
            return saat >= gunVerisi.acilis && saat < gunVerisi.kapanis;
        }

        async function restoranSec(isletmeId, kartEl) {
            // Tıklanan kartı vurgula
            if (kartEl) {
                kartEl.style.borderColor = '#f97316';
                kartEl.style.background = '#334155';
            }

            // Oturum oluştur
            const isletmeDoc = await db.collection('isletmeler').doc(isletmeId).get();
            const oturumRef = await db.collection('oturumlar').add({
                isletmeId: isletmeId,
                isletmeAdi: isletmeDoc.data().ad || '',
                avmId: avmId,
                aktif: true,
                kod: null,
                sepet: [],
                olusturma: firebase.firestore.FieldValue.serverTimestamp()
            });

            window.location.href = '/musteri?oturum=' + oturumRef.id + '&isletme=' + isletmeId + '&avm=' + avmId;
        }
    </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js")}</script>
</body>
</html>
