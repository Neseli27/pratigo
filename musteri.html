        .emoji-atla{display:block;margin:16px auto 0;background:none;border:none;color:#475569;font-size:13px;cursor:pointer;text-decoration:underline}
        .bilgi-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:180;display:none;align-items:center;justify-content:center;padding:20px}
        .bilgi-kutu{background:#1e293b;border-radius:16px;padding:24px;max-width:360px;width:100%}.bilgi-kutu h3{color:#f97316;font-size:16px;margin-bottom:12px}.bilgi-kutu .bilgi-satir{color:#94a3b8;font-size:13px;margin-bottom:8px;line-height:1.5}
        .bilgi-kutu .bilgi-kapat{margin-top:16px;width:100%;padding:12px;background:#334155;border:none;border-radius:10px;color:#f8fafc;font-weight:600;cursor:pointer}
        .bildirim-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}.bildirim-overlay.goster{display:flex}
        .bildirim-kutu{background:#1e293b;border-radius:16px;padding:24px;max-width:340px;width:100%;border:2px solid #334155;text-align:center;animation:bildirimAc .2s}@keyframes bildirimAc{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
        .bildirim-ikon{font-size:2.2rem;margin-bottom:12px}.bildirim-mesaj{color:#e2e8f0;font-size:14px;line-height:1.5;margin-bottom:20px}
        .bildirim-btn-ok{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff}

<body>
    <div class="header" id="headerAlani">
        <button class="btn-geri" onclick="cikisYap()" title="Çıkış">←</button>
        <div style="width:36px"></div>
        <div class="ikon" id="isletmeIkon">P</div>
        <div class="bilgi">
            <div class="isletme-adi" id="isletmeAdi">...</div>
            <div class="alt-bilgi" id="altBilgi"><span class="acik">Açık</span></div>
        </div>
        <button class="btn-bilgi" onclick="bilgiAc()">ℹ️</button>
    </div>
    <div class="kapali-banner" id="kapaliBanner"><h3>🔒 Şu An Kapalıyız</h3><p id="kapaliMesaj">Menüyü inceleyebilirsiniz fakat sipariş veremezsiniz.</p></div>
    <div class="bilgi-overlay" id="bilgiOverlay" onclick="bilgiKapat(event)"><div class="bilgi-kutu"><h3 id="bilgiAd">İşletme</h3><div id="bilgiIcerik"></div><button class="bilgi-kapat" onclick="bilgiKapat()">Kapat</button></div></div>
    <div class="durum-banner" id="durumBanner"></div>
    <div class="emoji-overlay" id="emojiOverlay"><div class="emoji-kutu" id="emojiKutu"><h3>Siparişinizi değerlendirin</h3><div class="yildiz-satir"><button class="yildiz-btn" onclick="yildizSec(1)">★</button><button class="yildiz-btn" onclick="yildizSec(2)">★</button><button class="yildiz-btn" onclick="yildizSec(3)">★</button><button class="yildiz-btn" onclick="yildizSec(4)">★</button><button class="yildiz-btn" onclick="yildizSec(5)">★</button></div><div class="puan-etiket" id="puanEtiket"></div><button class="btn-degerlendirme-gonder" id="btnDegerlendirmeGonder" onclick="degerlendirmeGonder()">Gönder</button><button class="emoji-atla" onclick="oturumuKapat()">Geç</button></div></div>
    <div class="onay-overlay" id="onayOverlay"><div class="onay-kutu"><div class="onay-baslik">📋 Sipariş Onayı</div><div class="onay-urun" id="onayUrunler"></div><div class="onay-toplam"><span>Toplam</span><span id="onayToplam">0 ₺</span></div><div class="onay-butonlar"><button class="btn-red" onclick="siparisiReddet()">Reddet</button><button class="btn-green" onclick="siparisiOnayla()">✓ Onayla</button></div></div></div>
    <div class="kategori-chips" id="kategoriChips" style="display:none"></div>
    <div id="menuAlani"><div class="menu-liste" id="menuListe"></div></div>
    <div id="bosMenu" class="bos-bilgi" style="display:none"><div class="ikon">🍽️</div><p>Menü yükleniyor...</p></div>
    <div class="sticky-bar" id="stickyBar"><div class="sol-bilgi" onclick="sepetAc()"><span class="sepet-cnt" id="sepetBadge2">0</span><span class="toplam-text"><span class="toplam-label">Toplam </span><span id="sepetToplamSticky">0 ₺</span></span></div><button class="btn-kasaya" onclick="kasayaIlet()">Kasaya Gönder →</button></div>
    <div class="sepet-overlay" id="sepetOverlay" onclick="sepetKapat(event)"><div class="sepet-panel" id="sepetPanel"><div class="sepet-panel-baslik"><h3>🛒 Sepetim</h3><button class="sepet-kapat" onclick="sepetKapat()">✕</button></div><div id="sepetDetay"></div><div class="sepet-toplam-satir"><span>Toplam</span><span id="sepetToplamText">0 ₺</span></div><div class="not-label">📝 Sipariş Notu</div><textarea class="siparis-not-input" id="siparisNotu" placeholder="Ketçapsız, ekstra sos, soğansız..."></textarea><div class="sepet-alt"><button class="btn-sepet-temizle" onclick="sepetiTemizle()">Temizle</button><button class="btn-sepet-kasaya" onclick="kasayaIlet()">Kasaya Gönder →</button></div></div></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
    <script src="/guvenlik.js"></script>
    <script>
        const params=new URLSearchParams(window.location.search);const oturumId=params.get('oturum');const isletmeId=params.get('isletme');const avmId=params.get('avm');
        if(!oturumId||!isletmeId){document.body.innerHTML='<div style="text-align:center;padding:60px 20px;color:#ef4444;font-size:1.2rem">Geçersiz oturum. QR kodu tekrar okutun.</div>'}
        function cikisYap(){if(oturumId){db.collection('oturumlar').doc(oturumId).update({aktif:false}).catch(()=>{})}const h=avmId||(isletmeVerisi&&isletmeVerisi.avmId);if(h){window.location.href='/avm?id='+h}else{window.location.href='/'}}
        let sepet=[],menuVerisi=[],oturumVerisi={},isletmeVerisi={},aktifSiparisId=null,kodUretildi=false,isletmeAcik=true,aktifKategori='';

        db.collection('oturumlar').doc(oturumId).onSnapshot(doc=>{if(!doc.exists)return;oturumVerisi=doc.data()});

        db.collection('isletmeler').doc(isletmeId).onSnapshot(doc=>{if(!doc.exists)return;isletmeVerisi=doc.data();document.getElementById('isletmeAdi').textContent=isletmeVerisi.ad||'';document.getElementById('isletmeIkon').textContent=(isletmeVerisi.ad||'P').charAt(0).toUpperCase();calismaSaatiKontrol();kategoriChipsCiz();menuCiz()});

        function calismaSaatiKontrol(){const cs=isletmeVerisi.calismaSaatleri;if(!cs){isletmeAcik=true;altBilgiGuncelle();return}const s=new Date(),g=['pazar','pazartesi','sali','carsamba','persembe','cuma','cumartesi'],bg=g[s.getDay()],t=s.toISOString().split('T')[0];let gv=null;if(isletmeVerisi.gunOzel&&isletmeVerisi.gunOzel[t]){gv=isletmeVerisi.gunOzel[t]}else{gv=cs[bg]}if(!gv||gv.kapali){isletmeKapali('Bugün kapalıyız');return}const sa=String(s.getHours()).padStart(2,'0')+':'+String(s.getMinutes()).padStart(2,'0');if(sa<gv.acilis||sa>=gv.kapanis){isletmeKapali('Çalışma saatleri: '+gv.acilis+' - '+gv.kapanis);return}isletmeAcik=true;document.getElementById('kapaliBanner').style.display='none';altBilgiGuncelle()}

        function altBilgiGuncelle(){const cs=isletmeVerisi.calismaSaatleri;const s=new Date(),g=['pazar','pazartesi','sali','carsamba','persembe','cuma','cumartesi'],gv=cs?cs[g[s.getDay()]]:null,sb=gv?gv.acilis+' - '+gv.kapanis:'';document.getElementById('altBilgi').innerHTML=isletmeAcik?'<span class="acik">● Açık</span>'+(sb?' · '+sb:''):'<span style="color:#ef4444">● Kapalı</span>'}
        function isletmeKapali(m){isletmeAcik=false;document.getElementById('kapaliMesaj').textContent=m+'. Menüyü inceleyebilirsiniz.';document.getElementById('kapaliBanner').style.display='block';altBilgiGuncelle()}

        function bilgiAc(){document.getElementById('bilgiAd').textContent=isletmeVerisi.ad||'';let h='';if(isletmeVerisi.tanitim){h+='<div class="bilgi-satir">'+GH(isletmeVerisi.tanitim)+'</div>'}if(isletmeVerisi.calismaSaatleri){const ga={pazartesi:'Pazartesi',sali:'Salı',carsamba:'Çarşamba',persembe:'Perşembe',cuma:'Cuma',cumartesi:'Cumartesi',pazar:'Pazar'};h+='<div class="bilgi-satir" style="margin-top:12px"><strong style="color:#f8fafc">Çalışma Saatleri</strong></div>';['pazartesi','sali','carsamba','persembe','cuma','cumartesi','pazar'].forEach(g=>{const v=isletmeVerisi.calismaSaatleri[g];if(v){const d=v.kapali?'<span style="color:#ef4444">Kapalı</span>':v.acilis+' - '+v.kapanis;h+='<div class="bilgi-satir">'+ga[g]+': '+d+'</div>'}})}if(!h)h='<div class="bilgi-satir">İşletme bilgisi henüz eklenmemiş.</div>';document.getElementById('bilgiIcerik').innerHTML=h;document.getElementById('bilgiOverlay').style.display='flex'}
        function bilgiKapat(e){if(e&&e.target&&e.target!==document.getElementById('bilgiOverlay')&&!e.target.classList.contains('bilgi-kapat'))return;document.getElementById('bilgiOverlay').style.display='none'}

        function kategoriChipsCiz(){const k=(isletmeVerisi.kategoriler||[]);const c=document.getElementById('kategoriChips');if(k.length===0){c.style.display='none';return}c.style.display='flex';c.innerHTML='<button class="kategori-chip '+(!aktifKategori?'aktif':'')+'" onclick="kategoriFiltrele(\'\')">Tümü</button>'+k.map(x=>'<button class="kategori-chip '+(aktifKategori===x?'aktif':'')+'" onclick="kategoriFiltrele(\''+GH(x)+'\')">'+GH(x)+'</button>').join('')}
        function kategoriFiltrele(k){aktifKategori=k;kategoriChipsCiz();menuCiz()}

        db.collection('isletmeler').doc(isletmeId).collection('menu').orderBy('sira','asc').onSnapshot(snap=>{menuVerisi=[];snap.forEach(doc=>menuVerisi.push({id:doc.id,...doc.data()}));menuCiz()});

        function menuCiz(){const l=document.getElementById('menuListe');let am=menuVerisi.filter(u=>u.aktif!==false);if(aktifKategori)am=am.filter(u=>u.kategori===aktifKategori);if(am.length===0&&menuVerisi.filter(u=>u.aktif!==false).length===0){l.innerHTML='';document.getElementById('bosMenu').style.display='block';document.getElementById('menuAlani').style.display='none';return}document.getElementById('bosMenu').style.display='none';document.getElementById('menuAlani').style.display='block';if(am.length===0){l.innerHTML='<div style="text-align:center;color:#475569;padding:30px;font-size:14px">Bu kategoride ürün bulunmuyor</div>';return}const kat=(isletmeVerisi.kategoriler||[]);const gr={};gr[']=[];kat.forEach(k=>{gr[k]=[]});am.forEach(u=>{const k=u.kategori||'';if(!gr[k])gr[k]=[];gr[k].push(u)});let h='';if(!aktifKategori){kat.forEach(k=>{if(!gr[k]||gr[k].length===0)return;h+='<div class="kat-baslik">'+GH(k)+'</div>';h+=gr[k].map(u=>menuSatirHTML(u)).join('')});if(gr[''].length>0){if(kat.length>0&&h)h+='<div class="kat-baslik" style="color:#475569">Diğer</div>';h+=gr[''].map(u=>menuSatirHTML(u)).join('')}}else{h=am.map(u=>menuSatirHTML(u)).join('')}l.innerHTML=h}

        function menuSatirHTML(u){const a=u.aciklama&&u.aciklama.trim().length>0;return '<div class="menu-satir" id="msatir_'+u.id+'"><div class="menu-satir-ust"><div class="menu-satir-sol"><div class="urun-ad">'+GH(u.ad)+'</div>'+(a?'<div class="urun-aciklama">'+GH(u.aciklama)+'</div>':'')+'</div><div class="menu-satir-sag"><span class="urun-fiyat">'+u.fiyat+' ₺</span><button class="btn-ekle" onclick="sepeteEkleTikla(event,\''+u.id+'\',\''+GH(u.ad)+'\','+u.fiyat+')">+</button></div></div></div>'}

        function sepeteEkleTikla(event,id,ad,fiyat){event.stopPropagation();if(!isletmeAcik){hataBildirim('İşletme şu an kapalı, sipariş veremezsiniz.');return}sepeteEkle(id,ad,fiyat);const s=document.getElementById('msatir_'+id);s.classList.add('secili');const b=event.currentTarget;b.classList.add('eklendi');b.textContent='✓';setTimeout(()=>{s.classList.remove('secili');b.classList.remove('eklendi');b.textContent='+'},600)}

        function sepeteEkle(id,ad,fiyat){const m=sepet.find(s=>s.id===id);if(m)m.adet++;else sepet.push({id,ad,fiyat,adet:1});sepetGuncelle()}
        function sepetGuncelle(){const t=sepet.reduce((t,s)=>t+(s.fiyat*s.adet),0);const a=sepet.reduce((t,s)=>t+s.adet,0);document.getElementById('sepetBadge2').textContent=a;document.getElementById('sepetToplamSticky').textContent=t+' ₺';document.getElementById('sepetToplamText').textContent=t+' ₺';document.getElementById('stickyBar').classList.toggle('aktif',a>0);document.getElementById('sepetDetay').innerHTML=sepet.map((s,i)=>'<div class="sepet-urun-satir"><div class="sepet-urun-ad">'+GH(s.ad)+'</div><div class="sepet-urun-adet"><button class="eksi" onclick="adetDegistir('+i+',-1)">−</button><span>'+s.adet+'</span><button class="arti" onclick="adetDegistir('+i+',1)">+</button></div><div class="sepet-urun-fiyat">'+(s.fiyat*s.adet)+' ₺</div></div>').join('');db.collection('oturumlar').doc(oturumId).update({sepet:sepet,sepetToplam:t})}
        function adetDegistir(i,d){sepet[i].adet+=d;if(sepet[i].adet<=0)sepet.splice(i,1);sepetGuncelle()}
        function sepetiTemizle(){sepet=[];sepetGuncelle();sepetKapat()}
        function sepetAc(){document.getElementById('sepetOverlay').style.display='flex'}
        function sepetKapat(e){if(e&&e.target!==document.getElementById('sepetOverlay'))return;document.getElementById('sepetOverlay').style.display='none'}

        async function kasayaIlet(){if(sepet.length===0)return;if(!isletmeAcik){hataBildirim('İşletme şu an kapalı, sipariş veremezsiniz.');return}const sn=document.getElementById('siparisNotu').value.trim();if(!kodUretildi){let kod='',benz=false,den=0;while(!benz&&den<50){den++;kod=String(Math.floor(Math.random()*900)+100);const m=await db.collection('oturumlar').where('kod','==',kod).where('aktif','==',true).where('isletmeId','==',isletmeId).get();if(m.empty)benz=true}if(!benz){hataBildirim('Şu an çok yoğunuz, lütfen birkaç dakika sonra tekrar deneyin.');return}await db.collection('oturumlar').doc(oturumId).update({kod:kod,kodGosterim:kod,sepetKasada:true,sepet:sepet,sepetToplam:sepet.reduce((t,s)=>t+(s.fiyat*s.adet),0),siparisNotu:sn});oturumVerisi.kod=kod;kodUretildi=true}else{await db.collection('oturumlar').doc(oturumId).update({sepetKasada:true,sepet:sepet,sepetToplam:sepet.reduce((t,s)=>t+(s.fiyat*s.adet),0),siparisNotu:sn})}sepetKapat();const toplam=sepet.reduce((t,s)=>t+(s.fiyat*s.adet),0),adet=sepet.reduce((t,s)=>t+s.adet,0);const b=document.getElementById('durumBanner');b.className='durum-banner durum-kasaya-git';b.style.display='block';b.innerHTML='<div style="width:64px;height:64px;border-radius:50%;background:#172554;border:2px solid #3b82f6;margin:0 auto 12px;display:flex;align-items:center;justify-content:center"><span style="font-size:24px">🏪</span></div><p style="color:#94a3b8;font-size:13px">Kasaya gidip bu kodu söyleyin</p><div class="kod-buyuk">'+oturumVerisi.kod+'</div><div class="info-badges"><div class="info-badge"><span class="lbl">Toplam</span><span class="val turuncu">'+toplam+' ₺</span></div><div class="info-badge"><span class="lbl">Ürün</span><span class="val" style="color:#e2e8f0">'+adet+' adet</span></div></div><div class="siparis-ozet" style="margin-top:14px">'+sepet.map(s=>'<div class="satir"><span>'+GH(s.ad)+' ×'+s.adet+'</span><span class="tutar">'+(s.fiyat*s.adet)+' ₺</span></div>').join('')+'</div>';gizleMenuVeSepet()}

        db.collection('siparisler').where('oturumId','==',oturumId).onSnapshot(snap=>{snap.docChanges().forEach(ch=>{const sp={id:ch.doc.id,...ch.doc.data()};siparisGuncelle(sp)})});

        function siparisGuncelle(sp){aktifSiparisId=sp.id;const b=document.getElementById('durumBanner');
        if(sp.durum==='onay_bekliyor'){onayModalGoster(sp);b.style.display='none'}
        else if(sp.durum==='onaylandi'||sp.durum==='odeme_bekliyor'){b.className='durum-banner durum-kasaya-git';b.style.display='block';b.innerHTML='<div style="width:56px;height:56px;border-radius:50%;background:#172554;border:2px solid #3b82f6;margin:0 auto 10px;display:flex;align-items:center;justify-content:center"><span style="font-size:22px">⏳</span></div><div style="font-size:15px;font-weight:700">Ödeme Bekleniyor</div><p style="color:#94a3b8;font-size:13px;margin-top:4px">Kasaya gidip ödemenizi yapın</p>';document.getElementById('onayOverlay').style.display='none';gizleMenuVeSepet()}
        else if(sp.durum==='hazirlaniyor'){b.className='durum-banner durum-hazirlaniyor';b.style.display='block';const ts=isletmeVerisi.tapiSure,tv=isletmeVerisi.tapiVeriSayisi||0;if(ts&&tv>=3){let kd=ts,yz=0;if(sp.mutfagaGiris){const gi=sp.mutfagaGiris.toDate(),gdk=Math.round((new Date()-gi)/60000);kd=Math.max(0,ts-gdk);yz=Math.min(95,Math.round((gdk/ts)*100))}const kt=kd>0?'~'+kd:'...';const doff=Math.round(226*(1-yz/100));b.innerHTML='<div class="circular-timer"><svg width="90" height="90" viewBox="0 0 90 90"><circle cx="45" cy="45" r="36" fill="none" stroke="#1e293b" stroke-width="6"/><circle cx="45" cy="45" r="36" fill="none" stroke="#22c55e" stroke-width="6" stroke-dasharray="226" stroke-dashoffset="'+doff+'" stroke-linecap="round" id="timerCircle"/></svg><div class="center-text"><div class="dakika" id="timerDk">'+kt+'</div><div class="birim">dk</div></div></div><div style="font-size:15px;font-weight:700">Siparişiniz Hazırlanıyor</div><div class="sira-no-pill"><span class="label">Sıra No</span><span class="numara">'+(GH(sp.siraNo)||'-')+'</span></div><div class="progress-bar-wrap"><div class="progress-bar"><div class="dolgu" id="beklemeCubuk" style="width:'+yz+'%"></div></div><div class="progress-labels"><span>Sipariş alındı</span><span class="bitti">Hazır</span></div></div><div class="siparis-ozet">'+(sp.urunler||[]).map(u=>'<div class="satir"><span>'+GH(u.ad)+' ×'+u.adet+'</span><span class="tutar">'+(u.fiyat*u.adet)+' ₺</span></div>').join('')+'</div>';if(window._beklemeInterval)clearInterval(window._beklemeInterval);window._beklemeInterval=setInterval(()=>{if(sp.mutfagaGiris){const gi=sp.mutfagaGiris.toDate(),gdk=Math.round((new Date()-gi)/60000),kl=Math.max(0,ts-gdk),yz2=Math.min(95,Math.round((gdk/ts)*100));const el=document.getElementById('timerDk');if(el)el.textContent=kl>0?'~'+kl:'...';const ci=document.getElementById('timerCircle');if(ci)ci.setAttribute('stroke-dashoffset',Math.round(226*(1-yz2/100)));const cu=document.getElementById('beklemeCubuk');if(cu)cu.style.width=yz2+'%'}},30000)}else{b.innerHTML='<div style="font-size:32px;margin-bottom:8px">👨‍🍳</div><div style="font-size:15px;font-weight:700">Siparişiniz Hazırlanıyor</div><div class="sira-no-pill"><span class="label">Sıra No</span><span class="numara">'+(GH(sp.siraNo)||'-')+'</span></div>'}gizleMenuVeSepet()}
        else if(sp.durum==='hazir'){if(window._beklemeInterval)clearInterval(window._beklemeInterval);b.className='durum-banner durum-hazir';b.style.display='block';b.innerHTML='<div class="hazir-check"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg></div><div class="sira-no-dev">'+(GH(sp.siraNo)||'')+'</div><div style="font-size:16px;font-weight:800;color:#22c55e">SİPARİŞİNİZ HAZIR!</div><p style="color:#86efac;font-size:13px;margin-top:4px">Teslim noktasından alabilirsiniz</p><button class="btn-aldim" onclick="siparisiAldim()">✓ Teslim Aldım</button><p class="oto-kapanma" id="otoKapanma"></p>';if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);bildirimSesiCal();gizleMenuVeSepet();let ks=300;if(window._otoKapanmaInterval)clearInterval(window._otoKapanmaInterval);function osg(){const d=Math.floor(ks/60),s=ks%60;const el=document.getElementById('otoKapanma');if(el)el.textContent=d+':'+String(s).padStart(2,'0')+' sonra otomatik kapatılacak'}osg();window._otoKapanmaInterval=setInterval(()=>{ks--;if(ks<=0){clearInterval(window._otoKapanmaInterval);siparisiAldim()}else{osg()}},1000)}}

        function gizleMenuVeSepet(){document.getElementById('menuAlani').style.display='none';document.getElementById('kategoriChips').style.display='none';document.getElementById('stickyBar').classList.remove('aktif')}
        function onayModalGoster(sp){document.getElementById('onayUrunler').innerHTML=(sp.urunler||[]).map(u=>'<div class="onay-urun-satir"><span>'+GH(u.ad)+' × '+u.adet+'</span><span style="color:#f97316;font-weight:700">'+(u.fiyat*u.adet)+' ₺</span></div>').join('');document.getElementById('onayToplam').textContent=sp.toplam+' ₺';document.getElementById('onayOverlay').style.display='flex'}
        function siparisiOnayla(){if(!aktifSiparisId)return;db.collection('siparisler').doc(aktifSiparisId).update({durum:'onaylandi'});document.getElementById('onayOverlay').style.display='none';sepet=[];sepetGuncelle()}
        function siparisiReddet(){if(!aktifSiparisId)return;db.collection('siparisler').doc(aktifSiparisId).update({durum:'reddedildi'});document.getElementById('onayOverlay').style.display='none'}
        function bildirimSesiCal(){try{const c=new(window.AudioContext||window.webkitAudioContext)();[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(.3,c.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+i*.15+.3);o.start(c.currentTime+i*.15);o.stop(c.currentTime+i*.15+.3)})}catch(e){}}

        let seciliPuan=0;const PUAN_ETIKETLER={1:'Kötü',2:'Orta',3:'İyi',4:'Güzel',5:'Muhteşem'};const PUAN_RENKLER={1:'#ef4444',2:'#f97316',3:'#eab308',4:'#22c55e',5:'#22c55e'};
        function siparisiAldim(){if(window._otoKapanmaInterval)clearInterval(window._otoKapanmaInterval);if(aktifSiparisId){db.collection('siparisler').doc(aktifSiparisId).update({durum:'teslim_edildi',teslimZaman:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{})}document.getElementById('durumBanner').style.display='none';document.getElementById('emojiOverlay').style.display='flex';window._emojiTimeout=setTimeout(()=>{oturumuKapat()},20000)}
        function yildizSec(p){seciliPuan=p;document.querySelectorAll('.yildiz-btn').forEach((b,i)=>{b.classList.toggle('secili',i<p)});document.getElementById('puanEtiket').textContent=PUAN_ETIKETLER[p];document.getElementById('puanEtiket').style.color=PUAN_RENKLER[p];document.getElementById('btnDegerlendirmeGonder').style.display='block'}
        function degerlendirmeGonder(){if(window._emojiTimeout)clearTimeout(window._emojiTimeout);if(!seciliPuan)return;if(aktifSiparisId){db.collection('siparisler').doc(aktifSiparisId).update({puan:seciliPuan,puanEtiket:PUAN_ETIKETLER[seciliPuan]}).catch(()=>{})}const k=document.getElementById('emojiKutu');const yh=Array(5).fill(0).map((_,i)=>'<span style="color:'+(i<seciliPuan?'#eab308':'#334155')+';font-size:2rem">★</span>').join('');k.innerHTML='<div style="margin-bottom:12px">'+yh+'</div><h3 style="color:'+PUAN_RENKLER[seciliPuan]+';font-size:18px">'+PUAN_ETIKETLER[seciliPuan]+'!</h3><p style="color:#64748b;margin-top:8px;font-size:13px">Teşekkürler, değerlendirmeniz kaydedildi</p>';setTimeout(()=>oturumuKapat(),2500)}
        function oturumuKapat(){if(window._emojiTimeout)clearTimeout(window._emojiTimeout);if(window._otoKapanmaInterval)clearInterval(window._otoKapanmaInterval);if(oturumId){db.collection('oturumlar').doc(oturumId).update({aktif:false}).catch(()=>{})}const h=avmId||(isletmeVerisi&&isletmeVerisi.avmId);if(h){window.location.href='/avm?id='+h}else{window.location.href='/'}}
    </script>
    <div class="bildirim-overlay" id="bildirimOverlay"><div class="bildirim-kutu"><div class="bildirim-ikon" id="bildirimIkon">⚠️</div><div class="bildirim-mesaj" id="bildirimMesaj"></div><button class="bildirim-btn-ok" onclick="document.getElementById('bildirimOverlay').classList.remove('goster')">Tamam</button></div></div>
    <script>function hataBildirim(m){document.getElementById('bildirimIkon').textContent='⚠️';document.getElementById('bildirimMesaj').textContent=m;document.getElementById('bildirimOverlay').classList.add('goster')}</script>
