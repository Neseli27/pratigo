<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRATİGO</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #060a12; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 90px;
            max-width: 1100px;
            margin: 0 auto;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }

        /* ÜST KARŞILAMA */
        .karsilama {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            text-align: center;
            padding: 28px 16px 20px;
            border-bottom: 1px solid #334155;
        }
        .karsilama .isletme-adi {
            font-size: 1.6rem;
            font-weight: 900;
            color: #f97316;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .karsilama .hos-geldin {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .karsilama .pratigo-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 12px;
            background: #334155;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 2px;
        }

        /* SİPARİŞ DURUMU BANNER */
        .durum-banner {
            margin: 16px;
            border-radius: 12px;
            padding: 16px 20px;
            display: none;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .durum-kasaya-git {
            background: linear-gradient(135deg, #1e3a5f, #172554);
            border: 2px solid #3b82f6;
        }
        .durum-hazirlaniyor {
            background: linear-gradient(135deg, #1a3320, #14532d);
            border: 2px solid #22c55e;
        }
        .durum-hazir {
            background: #14532d;
            border: 3px solid #22c55e;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
            50% { box-shadow: 0 0 20px 10px rgba(34, 197, 94, 0.3); }
        }
        .durum-onay-bekliyor {
            background: linear-gradient(135deg, #422006, #431407);
            border: 2px solid #f97316;
        }

        .durum-icon { font-size: 2rem; }
        .durum-text h3 { font-size: 1rem; margin-bottom: 2px; }
        .durum-text p { font-size: 0.85rem; color: #94a3b8; }

        .kod-buyuk {
            font-size: 3.5rem;
            font-weight: 900;
            color: #f97316;
            letter-spacing: 8px;
            text-align: center;
            margin: 8px 0;
            font-variant-numeric: tabular-nums;
        }

        .sira-no-dev {
            font-size: 3rem;
            font-weight: 900;
            color: #22c55e;
            text-align: center;
            margin: 8px 0;
        }

        /* ONAY MODAL */
        .onay-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .onay-kutu {
            background: #1e293b;
            border-radius: 20px;
            padding: 28px;
            max-width: 380px;
            width: 100%;
            border: 2px solid #3b82f6;
        }
        .onay-baslik {
            color: #3b82f6;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }
        .onay-urun {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .onay-urun-satir {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 0.95rem;
        }
        .onay-urun-satir:last-child { border: none; }
        .onay-toplam {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            color: #f97316;
            padding: 12px 0;
            border-top: 2px solid #334155;
        }
        .onay-butonlar {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .btn-red {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #ef4444;
            background: transparent;
            color: #ef4444;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-green {
            flex: 1.5;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* MENÜ */
        .section-title {
            padding: 0 16px;
            font-size: 1rem;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 12px;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu-liste {
            padding: 0 16px;
            margin-bottom: 20px;
        }
        .menu-satir {
            background: #1e293b;
            border-radius: 12px;
            border: 2px solid #334155;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .menu-satir.secili {
            border-color: #22c55e;
        }
        .menu-satir-ust {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
        }
        .menu-satir-sol {
            flex: 1;
            min-width: 0;
        }
        .menu-satir-sol .urun-ad {
            font-weight: 600;
            font-size: 1rem;
            color: #f8fafc;
            margin-bottom: 2px;
        }
        .menu-satir-sol .urun-fiyat {
            color: #f97316;
            font-weight: 700;
            font-size: 1.05rem;
        }
        .menu-satir-sol .aciklama-ikon {
            display: inline-block;
            color: #64748b;
            font-size: 0.75rem;
            margin-left: 6px;
            transition: transform 0.2s;
        }
        .menu-satir.acik .aciklama-ikon {
            transform: rotate(180deg);
        }
        .btn-ekle {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid #22c55e;
            background: transparent;
            color: #22c55e;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .btn-ekle:active {
            background: #22c55e;
            color: #fff;
            transform: scale(0.9);
        }
        .btn-ekle.eklendi {
            background: #22c55e;
            color: #fff;
        }
        .menu-aciklama {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease;
        }
        .menu-aciklama.acik {
            max-height: 200px;
        }
        .menu-aciklama-icerik {
            padding: 0 16px 14px;
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.5;
            border-top: 1px solid #334155;
            padding-top: 10px;
        }

        /* SEPET İKONU (SOL ALT) */
        .sepet-ikon {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: none;
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4);
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }
        .sepet-ikon.aktif { display: flex; }
        .sepet-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #dc2626;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 800;
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0f172a;
        }

        /* KASAYA GÖNDER BUTONU (SAĞ ALT) */
        .btn-kasaya-gonder {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 28px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4);
            z-index: 100;
        }
        .btn-kasaya-gonder.aktif { display: block; }

        /* SEPET OVERLAY */
        .sepet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 150;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .sepet-panel {
            background: #1e293b;
            border-radius: 20px 20px 0 0;
            padding: 24px 16px;
            width: 100%;
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .sepet-panel-baslik {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .sepet-panel-baslik h3 { font-size: 1.2rem; }
        .sepet-kapat {
            background: #334155;
            border: none;
            color: #f8fafc;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .sepet-urun-satir {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .sepet-urun-ad { flex: 1; font-size: 0.95rem; }
        .sepet-urun-adet {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sepet-urun-adet button {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .sepet-urun-adet .eksi { background: #dc2626; color: #fff; }
        .sepet-urun-adet .arti { background: #22c55e; color: #fff; }
        .sepet-urun-adet span {
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }
        .sepet-urun-fiyat {
            min-width: 70px;
            text-align: right;
            font-weight: 700;
            color: #f97316;
        }
        .sepet-toplam-satir {
            display: flex;
            justify-content: space-between;
            padding: 14px 0 8px;
            border-top: 2px solid #334155;
            font-size: 1.15rem;
            font-weight: 700;
            color: #f97316;
        }
        .sepet-alt {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }
        .btn-sepet-temizle {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #ef4444;
            background: transparent;
            color: #ef4444;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-sepet-kasaya {
            flex: 2;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
        }

        .bos-bilgi {
            text-align: center;
            padding: 40px 16px;
            color: #64748b;
        }
        .bos-bilgi .ikon { font-size: 3rem; margin-bottom: 12px; }

        /* ALDIM BUTONU */
        .btn-aldim {
            display: block;
            width: 100%;
            max-width: 280px;
            margin: 16px auto 0;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .btn-aldim:active { transform: scale(0.97); }
        .oto-kapanma {
            color: #475569;
            font-size: 0.75rem;
            margin-top: 10px;
            text-align: center;
        }

        /* EMOJİ GERİ BİLDİRİM */
        .emoji-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .emoji-kutu {
            text-align: center;
            padding: 32px;
            max-width: 340px;
            width: 100%;
        }
        .emoji-kutu h3 {
            color: #f8fafc;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .emoji-kutu p {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        .emoji-secim {
            display: flex;
            justify-content: center;
            gap: 24px;
        }
        .emoji-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #334155;
            background: #1e293b;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-btn:active { transform: scale(1.15); }
        .emoji-btn.olumlu:active { border-color: #22c55e; background: #14532d; }
        .emoji-btn.olumsuz:active { border-color: #ef4444; background: #450a0a; }
        .emoji-atla {
            display: block;
            margin: 20px auto 0;
            background: none;
            border: none;
            color: #475569;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
        }

        /* ÇIKIŞ BUTONU */
        .btn-cikis {
            position: absolute;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #334155;
            border: none;
            color: #94a3b8;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SİPARİŞ NOTU */
        .siparis-not-input {
            width: 100%;
            padding: 10px 12px;
            background: #0f172a;
            border: 2px solid #475569;
            border-radius: 10px;
            color: #f8fafc;
            font-size: 0.9rem;
            outline: none;
            resize: none;
            min-height: 44px;
            font-family: inherit;
            margin-top: 8px;
        }
        .siparis-not-input:focus { border-color: #f97316; }
        .siparis-not-input::placeholder { color: #475569; }
        .not-label { color: #94a3b8; font-size: 0.8rem; margin-top: 12px; }

        /* KAPALI BANNER */
        .kapali-banner {
            margin: 16px;
            padding: 16px;
            background: #1e293b;
            border: 2px solid #ef4444;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .kapali-banner .ikon { font-size: 1.5rem; margin-bottom: 6px; }
        .kapali-banner h3 { color: #ef4444; font-size: 1rem; margin-bottom: 4px; }
        .kapali-banner p { color: #94a3b8; font-size: 0.85rem; }

        /* İŞLETME BİLGİ */
        .bilgi-btn {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #334155;
            border: none;
            color: #94a3b8;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .bilgi-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 180;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .bilgi-kutu {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            max-width: 360px;
            width: 100%;
        }
        .bilgi-kutu h3 {
            color: #f97316;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }
        .bilgi-kutu .bilgi-satir {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .bilgi-kutu .bilgi-kapat {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            background: #334155;
            border: none;
            border-radius: 10px;
            color: #f8fafc;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- KARŞILAMA -->
    <div class="karsilama" style="position:relative">
        <button class="btn-cikis" onclick="cikisYap()" title="Çıkış">←</button>
        <div class="isletme-adi" id="isletmeAdi">...</div>
        <div class="hos-geldin">Hoş Geldiniz</div>
        <div class="pratigo-badge">PRATİGO</div>
        <button class="bilgi-btn" onclick="bilgiAc()">ℹ️</button>
    </div>

    <!-- KAPALI BANNER -->
    <div class="kapali-banner" id="kapaliBanner">
        <div class="ikon">🔒</div>
        <h3>Şu An Kapalıyız</h3>
        <p id="kapaliMesaj">Menüyü inceleyebilirsiniz fakat sipariş veremezsiniz.</p>
    </div>

    <!-- İŞLETME BİLGİ OVERLAY -->
    <div class="bilgi-overlay" id="bilgiOverlay" onclick="bilgiKapat(event)">
        <div class="bilgi-kutu">
            <h3 id="bilgiAd">İşletme</h3>
            <div id="bilgiIcerik"></div>
            <button class="bilgi-kapat" onclick="bilgiKapat()">Kapat</button>
        </div>
    </div>

    <!-- SİPARİŞ DURUM BANNER -->
    <div class="durum-banner" id="durumBanner"></div>

    <!-- EMOJİ GERİ BİLDİRİM -->
    <div class="emoji-overlay" id="emojiOverlay">
        <div class="emoji-kutu">
            <h3>Siparişiniz nasıldı?</h3>
            <p>Tek dokunuşla değerlendirin</p>
            <div class="emoji-secim">
                <button class="emoji-btn olumlu" onclick="geriBildirimGonder('olumlu')">😊</button>
                <button class="emoji-btn olumsuz" onclick="geriBildirimGonder('olumsuz')">😞</button>
            </div>
            <button class="emoji-atla" onclick="oturumuKapat()">Geç</button>
        </div>
    </div>

    <!-- ONAY MODAL -->
    <div class="onay-overlay" id="onayOverlay">
        <div class="onay-kutu">
            <div class="onay-baslik">📋 Sipariş Onayı</div>
            <div class="onay-urun" id="onayUrunler"></div>
            <div class="onay-toplam">
                <span>Toplam</span>
                <span id="onayToplam">0 ₺</span>
            </div>
            <div class="onay-butonlar">
                <button class="btn-red" onclick="siparisiReddet()">Reddet</button>
                <button class="btn-green" onclick="siparisiOnayla()">✓ Onayla</button>
            </div>
        </div>
    </div>

    <!-- MENÜ -->
    <div id="menuAlani">
        <p class="section-title">Menü</p>
        <div class="menu-liste" id="menuListe"></div>
    </div>

    <div id="bosMenu" class="bos-bilgi" style="display:none">
        <div class="ikon">🍽️</div>
        <p>Menü yükleniyor...</p>
    </div>

    <!-- SEPET İKONU (SOL ALT) -->
    <button class="sepet-ikon" id="sepetIkon" onclick="sepetAc()">
        🛒
        <span class="sepet-badge" id="sepetBadge">0</span>
    </button>

    <!-- KASAYA GÖNDER (SAĞ ALT) -->
    <button class="btn-kasaya-gonder" id="btnKasayaGonder" onclick="kasayaIlet()">
        Kasaya Gönder →
    </button>

    <!-- SEPET OVERLAY -->
    <div class="sepet-overlay" id="sepetOverlay" onclick="sepetKapat(event)">
        <div class="sepet-panel" id="sepetPanel">
            <div class="sepet-panel-baslik">
                <h3>🛒 Sepetim</h3>
                <button class="sepet-kapat" onclick="sepetKapat()">✕</button>
            </div>
            <div id="sepetDetay"></div>
            <div class="sepet-toplam-satir">
                <span>Toplam</span>
                <span id="sepetToplamText">0 ₺</span>
            </div>
            <div class="not-label">📝 Sipariş Notu</div>
            <textarea class="siparis-not-input" id="siparisNotu" placeholder="Ketçapsız, ekstra sos, az pişmiş..."></textarea>
            <div class="sepet-alt">
                <button class="btn-sepet-temizle" onclick="sepetiTemizle()">Temizle</button>
                <button class="btn-sepet-kasaya" onclick="kasayaIlet()">Kasaya Gönder →</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/firebase-config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const oturumId = params.get('oturum');
        const isletmeId = params.get('isletme');
        const avmId = params.get('avm');

        if (!oturumId || !isletmeId) {
            document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#ef4444;font-size:1.2rem;">Geçersiz oturum. QR kodu tekrar okutun.</div>';
        }

        function cikisYap() {
            // Oturumu kapat
            if (oturumId) {
                db.collection('oturumlar').doc(oturumId).update({ aktif: false }).catch(() => {});
            }
            // AVM'den geldiyse veya işletme AVM'ye bağlıysa AVM sayfasına dön
            const hedefAvm = avmId || (isletmeVerisi && isletmeVerisi.avmId);
            if (hedefAvm) {
                window.location.href = '/avm?id=' + hedefAvm;
            } else {
                window.location.href = '/';
            }
        }

        let sepet = [];
        let menuVerisi = [];
        let oturumVerisi = {};
        let isletmeVerisi = {};
        let aktifSiparisId = null;
        let kodUretildi = false;
        let isletmeAcik = true;

        // ========== OTURUM DİNLE ==========
        db.collection('oturumlar').doc(oturumId).onSnapshot(doc => {
            if (!doc.exists) return;
            oturumVerisi = doc.data();
            document.getElementById('isletmeAdi').textContent = oturumVerisi.isletmeAdi || '';
        });

        // ========== İŞLETME VERİSİ DİNLE (çalışma saatleri + bilgi) ==========
        db.collection('isletmeler').doc(isletmeId).onSnapshot(doc => {
            if (!doc.exists) return;
            isletmeVerisi = doc.data();
            calismaSaatiKontrol();
        });

        function calismaSaatiKontrol() {
            const cs = isletmeVerisi.calismaSaatleri;
            if (!cs) { isletmeAcik = true; return; }

            const simdi = new Date();
            const gunler = ['pazar','pazartesi','sali','carsamba','persembe','cuma','cumartesi'];
            const bugunkiGun = gunler[simdi.getDay()];
            const tarih = simdi.toISOString().split('T')[0];

            // Güne özel kontrol
            let gunVerisi = null;
            if (isletmeVerisi.gunOzel && isletmeVerisi.gunOzel[tarih]) {
                gunVerisi = isletmeVerisi.gunOzel[tarih];
            } else {
                gunVerisi = cs[bugunkiGun];
            }

            if (!gunVerisi || gunVerisi.kapali) {
                isletmeKapali('Bugün kapalıyız');
                return;
            }

            const saat = String(simdi.getHours()).padStart(2, '0') + ':' + String(simdi.getMinutes()).padStart(2, '0');
            if (saat < gunVerisi.acilis || saat >= gunVerisi.kapanis) {
                isletmeKapali('Çalışma saatleri: ' + gunVerisi.acilis + ' - ' + gunVerisi.kapanis);
                return;
            }

            isletmeAcik = true;
            document.getElementById('kapaliBanner').style.display = 'none';
        }

        function isletmeKapali(mesaj) {
            isletmeAcik = false;
            const banner = document.getElementById('kapaliBanner');
            document.getElementById('kapaliMesaj').textContent = mesaj + '. Menüyü inceleyebilirsiniz.';
            banner.style.display = 'block';
        }

        // ========== BİLGİ MODAL ==========
        function bilgiAc() {
            document.getElementById('bilgiAd').textContent = isletmeVerisi.ad || '';
            let html = '';
            if (isletmeVerisi.tanitim) {
                html += '<div class="bilgi-satir">' + isletmeVerisi.tanitim + '</div>';
            }
            if (isletmeVerisi.calismaSaatleri) {
                const gunAdlari = { pazartesi:'Pazartesi', sali:'Salı', carsamba:'Çarşamba', persembe:'Perşembe', cuma:'Cuma', cumartesi:'Cumartesi', pazar:'Pazar' };
                html += '<div class="bilgi-satir" style="margin-top:12px"><strong style="color:#f8fafc">Çalışma Saatleri</strong></div>';
                ['pazartesi','sali','carsamba','persembe','cuma','cumartesi','pazar'].forEach(g => {
                    const v = isletmeVerisi.calismaSaatleri[g];
                    if (v) {
                        const durum = v.kapali ? '<span style="color:#ef4444">Kapalı</span>' : v.acilis + ' - ' + v.kapanis;
                        html += '<div class="bilgi-satir">' + gunAdlari[g] + ': ' + durum + '</div>';
                    }
                });
            }
            if (!html) html = '<div class="bilgi-satir">İşletme bilgisi henüz eklenmemiş.</div>';
            document.getElementById('bilgiIcerik').innerHTML = html;
            document.getElementById('bilgiOverlay').style.display = 'flex';
        }

        function bilgiKapat(e) {
            if (e && e.target !== document.getElementById('bilgiOverlay')) return;
            document.getElementById('bilgiOverlay').style.display = 'none';
        }

        // ========== MENÜ DİNLE ==========
        db.collection('isletmeler').doc(isletmeId).collection('menu').orderBy('sira', 'asc').onSnapshot(snapshot => {
            menuVerisi = [];
            snapshot.forEach(doc => {
                menuVerisi.push({ id: doc.id, ...doc.data() });
            });
            menuCiz();
        });

        function menuCiz() {
            const liste = document.getElementById('menuListe');
            const aktifMenu = menuVerisi.filter(u => u.aktif !== false);
            if (aktifMenu.length === 0) {
                liste.innerHTML = '';
                document.getElementById('bosMenu').style.display = 'block';
                document.getElementById('menuAlani').style.display = 'none';
                return;
            }
            document.getElementById('bosMenu').style.display = 'none';
            document.getElementById('menuAlani').style.display = 'block';

            liste.innerHTML = aktifMenu.map(u => {
                const aciklamaVar = u.aciklama && u.aciklama.trim().length > 0;
                return `
                <div class="menu-satir" id="msatir_${u.id}">
                    <div class="menu-satir-ust">
                        <div class="menu-satir-sol" onclick="menuAciklamaToggle('${u.id}')">
                            <div class="urun-ad">
                                ${u.ad}
                                ${aciklamaVar ? '<span class="aciklama-ikon">▼</span>' : ''}
                            </div>
                            <div class="urun-fiyat">${u.fiyat} ₺</div>
                        </div>
                        <button class="btn-ekle" onclick="sepeteEkleTikla(event, '${u.id}', '${u.ad}', ${u.fiyat})">+</button>
                    </div>
                    ${aciklamaVar ? `
                    <div class="menu-aciklama" id="maciklama_${u.id}">
                        <div class="menu-aciklama-icerik">${u.aciklama}</div>
                    </div>
                    ` : ''}
                </div>
                `;
            }).join('');
        }

        function menuAciklamaToggle(id) {
            const satir = document.getElementById('msatir_' + id);
            const aciklama = document.getElementById('maciklama_' + id);
            if (!aciklama) return;
            satir.classList.toggle('acik');
            aciklama.classList.toggle('acik');
        }

        function sepeteEkleTikla(event, id, ad, fiyat) {
            event.stopPropagation();
            if (!isletmeAcik) {
                return alert('İşletme şu an kapalı, sipariş veremezsiniz.');
            }
            sepeteEkle(id, ad, fiyat);
            const satir = document.getElementById('msatir_' + id);
            satir.classList.add('secili');
            const btn = event.currentTarget;
            btn.classList.add('eklendi');
            btn.textContent = '✓';
            setTimeout(() => {
                satir.classList.remove('secili');
                btn.classList.remove('eklendi');
                btn.textContent = '+';
            }, 600);
        }

        // ========== SEPET ==========
        function sepeteEkle(id, ad, fiyat) {
            const mevcut = sepet.find(s => s.id === id);
            if (mevcut) mevcut.adet++;
            else sepet.push({ id, ad, fiyat, adet: 1 });
            sepetGuncelle();
        }

        function sepetGuncelle() {
            const toplam = sepet.reduce((t, s) => t + (s.fiyat * s.adet), 0);
            const adet = sepet.reduce((t, s) => t + s.adet, 0);

            document.getElementById('sepetBadge').textContent = adet;
            document.getElementById('sepetIkon').classList.toggle('aktif', adet > 0);
            document.getElementById('btnKasayaGonder').classList.toggle('aktif', adet > 0);
            document.getElementById('sepetToplamText').textContent = toplam + ' ₺';

            document.getElementById('sepetDetay').innerHTML = sepet.map((s, i) => `
                <div class="sepet-urun-satir">
                    <div class="sepet-urun-ad">${s.ad}</div>
                    <div class="sepet-urun-adet">
                        <button class="eksi" onclick="adetDegistir(${i}, -1)">−</button>
                        <span>${s.adet}</span>
                        <button class="arti" onclick="adetDegistir(${i}, 1)">+</button>
                    </div>
                    <div class="sepet-urun-fiyat">${s.fiyat * s.adet} ₺</div>
                </div>
            `).join('');

            db.collection('oturumlar').doc(oturumId).update({
                sepet: sepet,
                sepetToplam: toplam
            });
        }

        function adetDegistir(index, delta) {
            sepet[index].adet += delta;
            if (sepet[index].adet <= 0) sepet.splice(index, 1);
            sepetGuncelle();
        }

        function sepetiTemizle() {
            sepet = [];
            sepetGuncelle();
            sepetKapat();
        }

        function sepetAc() {
            document.getElementById('sepetOverlay').style.display = 'flex';
        }

        function sepetKapat(e) {
            if (e && e.target !== document.getElementById('sepetOverlay')) return;
            document.getElementById('sepetOverlay').style.display = 'none';
        }

        // ========== KASAYA İLET (3 HANELİ KOD ÜRET) ==========
        async function kasayaIlet() {
            if (sepet.length === 0) return;
            if (!isletmeAcik) return alert('İşletme şu an kapalı, sipariş veremezsiniz.');

            const siparisNotu = document.getElementById('siparisNotu').value.trim();

            if (!kodUretildi) {
                let kod = '';
                let benzersiz = false;
                while (!benzersiz) {
                    kod = String(Math.floor(Math.random() * 900) + 100);
                    const mevcut = await db.collection('oturumlar')
                        .where('kod', '==', kod)
                        .where('aktif', '==', true)
                        .where('isletmeId', '==', isletmeId)
                        .get();
                    if (mevcut.empty) benzersiz = true;
                }

                await db.collection('oturumlar').doc(oturumId).update({
                    kod: kod,
                    kodGosterim: kod,
                    sepetKasada: true,
                    sepet: sepet,
                    sepetToplam: sepet.reduce((t, s) => t + (s.fiyat * s.adet), 0),
                    siparisNotu: siparisNotu
                });

                oturumVerisi.kod = kod;
                kodUretildi = true;
            } else {
                await db.collection('oturumlar').doc(oturumId).update({
                    sepetKasada: true,
                    sepet: sepet,
                    sepetToplam: sepet.reduce((t, s) => t + (s.fiyat * s.adet), 0),
                    siparisNotu: siparisNotu
                });
            }

            sepetKapat();

            const banner = document.getElementById('durumBanner');
            banner.className = 'durum-banner durum-kasaya-git';
            banner.style.display = 'flex';
            banner.innerHTML = `
                <div style="text-align:center;width:100%">
                    <div style="font-size:1.5rem;margin-bottom:6px">🏪</div>
                    <p style="color:#94a3b8;margin-bottom:8px">Kasaya gidip bu kodu söyleyin</p>
                    <div class="kod-buyuk">${oturumVerisi.kod}</div>
                    <p style="color:#64748b;font-size:0.8rem;margin-top:8px">Ödemenizi kasada yapın</p>
                </div>
            `;

            document.getElementById('sepetIkon').classList.remove('aktif');
            document.getElementById('btnKasayaGonder').classList.remove('aktif');
        }

        // ========== SİPARİŞ DİNLE ==========
        db.collection('siparisler')
            .where('oturumId', '==', oturumId)
            .onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    const siparis = { id: change.doc.id, ...change.doc.data() };
                    siparisGuncelle(siparis);
                });
            });

        function siparisGuncelle(siparis) {
            aktifSiparisId = siparis.id;
            const banner = document.getElementById('durumBanner');

            if (siparis.durum === 'onay_bekliyor') {
                onayModalGoster(siparis);
                banner.style.display = 'none';
            }
            else if (siparis.durum === 'onaylandi' || siparis.durum === 'odeme_bekliyor') {
                banner.className = 'durum-banner durum-kasaya-git';
                banner.style.display = 'flex';
                banner.innerHTML = `
                    <div class="durum-icon">⏳</div>
                    <div class="durum-text">
                        <h3>Ödeme Bekleniyor</h3>
                        <p>Kasaya gidip ödemenizi yapın</p>
                    </div>
                `;
                document.getElementById('onayOverlay').style.display = 'none';
                gizleMenuVeSepet();
            }
            else if (siparis.durum === 'hazirlaniyor') {
                banner.className = 'durum-banner durum-hazirlaniyor';
                banner.style.display = 'flex';

                // Tahmini süre hesapla
                let tahminHTML = '';
                const tapiSure = isletmeVerisi.tapiSure;
                const tapiVeri = isletmeVerisi.tapiVeriSayisi || 0;

                if (tapiSure && tapiVeri >= 3) {
                    // Mutfağa giriş zamanı varsa kalan süreyi hesapla
                    let kalanHTML = '';
                    if (siparis.mutfagaGiris) {
                        const giris = siparis.mutfagaGiris.toDate();
                        const gecenDk = Math.round((new Date() - giris) / 60000);
                        const kalan = Math.max(0, tapiSure - gecenDk);
                        if (kalan > 0) {
                            kalanHTML = '<div style="font-size:2rem;font-weight:900;color:#22c55e;margin:8px 0">~' + kalan + ' dk</div>';
                        } else {
                            kalanHTML = '<div style="font-size:1rem;color:#22c55e;margin:8px 0">Birazdan hazır...</div>';
                        }
                    } else {
                        kalanHTML = '<div style="font-size:2rem;font-weight:900;color:#22c55e;margin:8px 0">~' + tapiSure + ' dk</div>';
                    }

                    tahminHTML = `
                        <div style="text-align:center;width:100%">
                            <div style="font-size:1.5rem;margin-bottom:4px">👨‍🍳</div>
                            <h3 style="color:#f8fafc;font-size:1rem">Siparişiniz Hazırlanıyor</h3>
                            <p style="color:#94a3b8;font-size:0.85rem">Sıra No: <strong style="color:#f97316;font-size:1.3rem">${siparis.siraNo || '-'}</strong></p>
                            <div style="margin-top:10px;padding:12px;background:rgba(0,0,0,0.2);border-radius:10px">
                                <p style="color:#64748b;font-size:0.75rem;text-transform:uppercase;letter-spacing:1px">Tahmini Bekleme</p>
                                ${kalanHTML}
                                <div style="width:100%;height:4px;background:#334155;border-radius:4px;overflow:hidden;margin-top:6px">
                                    <div id="beklemeCubuk" style="height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:4px;transition:width 1s;width:0%"></div>
                                </div>
                            </div>
                        </div>
                    `;

                    // İlerleme çubuğu güncelle
                    if (siparis.mutfagaGiris) {
                        const giris = siparis.mutfagaGiris.toDate();
                        const gecenDk = (new Date() - giris) / 60000;
                        const yuzde = Math.min(95, Math.round((gecenDk / tapiSure) * 100));
                        setTimeout(() => {
                            const cubuk = document.getElementById('beklemeCubuk');
                            if (cubuk) cubuk.style.width = yuzde + '%';
                        }, 300);
                    }

                    // Geri sayımı her dakika güncelle
                    if (window._beklemeInterval) clearInterval(window._beklemeInterval);
                    window._beklemeInterval = setInterval(() => {
                        if (siparis.mutfagaGiris) {
                            const giris = siparis.mutfagaGiris.toDate();
                            const gecenDk = Math.round((new Date() - giris) / 60000);
                            const kalan = Math.max(0, tapiSure - gecenDk);
                            const yuzde = Math.min(95, Math.round((gecenDk / tapiSure) * 100));
                            const cubuk = document.getElementById('beklemeCubuk');
                            if (cubuk) cubuk.style.width = yuzde + '%';
                        }
                    }, 30000); // 30 saniyede bir güncelle
                } else {
                    // Henüz yeterli veri yok — basit gösterim
                    tahminHTML = `
                        <div class="durum-icon">👨‍🍳</div>
                        <div class="durum-text">
                            <h3>Siparişiniz Hazırlanıyor</h3>
                            <p>Sıra No: <strong style="color:#f97316;font-size:1.3rem">${siparis.siraNo || '-'}</strong></p>
                        </div>
                    `;
                }

                banner.innerHTML = tahminHTML;
                gizleMenuVeSepet();
            }
            else if (siparis.durum === 'hazir') {
                if (window._beklemeInterval) clearInterval(window._beklemeInterval);
                banner.className = 'durum-banner durum-hazir';
                banner.style.display = 'flex';
                banner.innerHTML = `
                    <div style="text-align:center;width:100%">
                        <div style="font-size:2.5rem;margin-bottom:8px">🎉</div>
                        <div class="sira-no-dev">${siparis.siraNo || ''}</div>
                        <h3 style="color:#22c55e;font-size:1.3rem;margin-bottom:4px">SİPARİŞİNİZ HAZIR!</h3>
                        <p style="color:#86efac">Teslim noktasından alabilirsiniz</p>
                        <button class="btn-aldim" onclick="siparisiAldim()">✓ ALDIM</button>
                        <p class="oto-kapanma" id="otoKapanma"></p>
                    </div>
                `;
                if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
                bildirimSesiCal();
                gizleMenuVeSepet();

                // 5 dakika sonra otomatik "aldım" kabul et
                let kalanSn = 300; // 5 dakika
                if (window._otoKapanmaInterval) clearInterval(window._otoKapanmaInterval);
                function otoSayaciGuncelle() {
                    const dk = Math.floor(kalanSn / 60);
                    const sn = kalanSn % 60;
                    const el = document.getElementById('otoKapanma');
                    if (el) el.textContent = dk + ':' + String(sn).padStart(2, '0') + ' sonra otomatik kapatılacak';
                }
                otoSayaciGuncelle();
                window._otoKapanmaInterval = setInterval(() => {
                    kalanSn--;
                    if (kalanSn <= 0) {
                        clearInterval(window._otoKapanmaInterval);
                        siparisiAldim();
                    } else {
                        otoSayaciGuncelle();
                    }
                }, 1000);
            }
        }

        function gizleMenuVeSepet() {
            document.getElementById('menuAlani').style.display = 'none';
            document.getElementById('sepetIkon').classList.remove('aktif');
            document.getElementById('btnKasayaGonder').classList.remove('aktif');
        }

        function onayModalGoster(siparis) {
            document.getElementById('onayUrunler').innerHTML = (siparis.urunler || []).map(u => `
                <div class="onay-urun-satir">
                    <span>${u.ad} × ${u.adet}</span>
                    <span style="color:#f97316;font-weight:700">${u.fiyat * u.adet} ₺</span>
                </div>
            `).join('');
            document.getElementById('onayToplam').textContent = siparis.toplam + ' ₺';
            document.getElementById('onayOverlay').style.display = 'flex';
        }

        function siparisiOnayla() {
            if (!aktifSiparisId) return;
            db.collection('siparisler').doc(aktifSiparisId).update({ durum: 'onaylandi' });
            document.getElementById('onayOverlay').style.display = 'none';
            sepet = [];
            sepetGuncelle();
        }

        function siparisiReddet() {
            if (!aktifSiparisId) return;
            db.collection('siparisler').doc(aktifSiparisId).update({ durum: 'reddedildi' });
            document.getElementById('onayOverlay').style.display = 'none';
        }

        function bildirimSesiCal() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [523, 659, 784, 1047].forEach((f, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = f;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.3);
                    osc.start(ctx.currentTime + i * 0.15);
                    osc.stop(ctx.currentTime + i * 0.15 + 0.3);
                });
            } catch(e) {}
        }

        // ========== ALDIM + GERİ BİLDİRİM ==========
        function siparisiAldim() {
            if (window._otoKapanmaInterval) clearInterval(window._otoKapanmaInterval);

            // Siparişi "teslim_edildi" olarak güncelle
            if (aktifSiparisId) {
                db.collection('siparisler').doc(aktifSiparisId).update({
                    durum: 'teslim_edildi',
                    teslimZaman: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(() => {});
            }

            // Emoji geri bildirim göster
            document.getElementById('durumBanner').style.display = 'none';
            document.getElementById('emojiOverlay').style.display = 'flex';

            // 15 saniye sonra geri bildirim vermezse otomatik kapat
            window._emojiTimeout = setTimeout(() => {
                oturumuKapat();
            }, 15000);
        }

        function geriBildirimGonder(tip) {
            if (window._emojiTimeout) clearTimeout(window._emojiTimeout);

            // Geri bildirimi kaydet
            if (aktifSiparisId) {
                db.collection('siparisler').doc(aktifSiparisId).update({
                    geriBildirim: tip
                }).catch(() => {});

                // İşletmenin geri bildirim istatistiğini güncelle
                const alan = tip === 'olumlu' ? 'olumluSayisi' : 'olumsuzSayisi';
                db.collection('isletmeler').doc(isletmeId).update({
                    [alan]: firebase.firestore.FieldValue.increment(1)
                }).catch(() => {});
            }

            // Kısa teşekkür göster, sonra kapat
            const kutu = document.querySelector('.emoji-kutu');
            kutu.innerHTML = `
                <div style="font-size:3rem;margin-bottom:12px">${tip === 'olumlu' ? '😊' : '😞'}</div>
                <h3 style="color:#22c55e">Teşekkürler!</h3>
                <p style="color:#64748b;margin-top:8px">Değerlendirmeniz kaydedildi</p>
            `;

            setTimeout(() => oturumuKapat(), 2000);
        }

        function oturumuKapat() {
            if (window._emojiTimeout) clearTimeout(window._emojiTimeout);
            if (window._otoKapanmaInterval) clearInterval(window._otoKapanmaInterval);

            // Oturumu kapat
            if (oturumId) {
                db.collection('oturumlar').doc(oturumId).update({ aktif: false }).catch(() => {});
            }

            // AVM'den geldiyse oraya dön, yoksa ana sayfaya
            const hedefAvm = avmId || (isletmeVerisi && isletmeVerisi.avmId);
            if (hedefAvm) {
                window.location.href = '/avm?id=' + hedefAvm;
            } else {
                window.location.href = '/';
            }
        }
    </script>
